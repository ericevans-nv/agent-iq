# Example: Running nat eval on the email phishing analyzer with LangSmith experiment tracking
#
# Prerequisites:
#   export LANGSMITH_API_KEY=<your-langsmith-api-key>
#   export NVIDIA_API_KEY=<your-nvidia-api-key>
#
# Run:
#   nat eval --config_file examples/evaluation_and_profiling/email_phishing_analyzer/src/nat_email_phishing_analyzer/configs/config-langsmith-eval.yml
#
# After running, check your LangSmith project for:
#   - Dataset created from the eval questions
#   - Per-example runs with model answers linked to dataset examples
#   - Evaluator scores as feedback on each run
#   - OTEL span traces for each LLM call (from the existing langsmith OTEL exporter)

general:
  telemetry:
    tracing:
      langsmith:
        _type: langsmith
        project: nat-email-phishing-eval
        endpoint: "${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}/otel/v1/traces"
        api_key: ${LANGSMITH_API_KEY}
        workspace_id: ${LANGSMITH_WORKSPACE_ID:-}

functions:
  email_phishing_analyzer:
    _type: email_phishing_analyzer
    llm: nim_llm
    prompt: |
      Examine the following email content and determine if it exhibits signs of malicious intent. Look for any
        suspicious signals that may indicate phishing, such as requests for personal information or suspicious tone.

      Email content:
      {body}

      Return your findings as a JSON object with these fields:

      - is_likely_phishing: (boolean) true if phishing is suspected
      - explanation: (string) detailed explanation of your reasoning

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-405b-instruct
    temperature: 0.0
    max_tokens: 512
  nim_rag_eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    max_tokens: 8
  nim_trajectory_eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

workflow:
  _type: react_agent
  tool_names:
    - email_phishing_analyzer
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3

eval:
  general:
    output_dir: ./.tmp/eval/examples/evaluation_and_profiling/email_phishing_analyzer/langsmith_eval
    verbose: true
    dataset:
        _type: csv
        file_path: examples/evaluation_and_profiling/email_phishing_analyzer/data/smaller_test.csv
        id_key: "subject"
        structure:
          question_key: body
          answer_key: label

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: nim_rag_eval_llm
    groundedness:
      _type: ragas
      metric: ResponseGroundedness
      llm_name: nim_rag_eval_llm
    relevance:
      _type: ragas
      metric: ContextRelevance
      llm_name: nim_rag_eval_llm
    trajectory_accuracy:
      _type: trajectory
      llm_name: nim_trajectory_eval_llm
