# Example: Running nat optimize with LangSmith tracing
#
# Prerequisites:
#   export LANGSMITH_API_KEY=<your-langsmith-api-key>
#   export NVIDIA_API_KEY=<your-nvidia-api-key>
#
# Run:
#   nat optimize --config_file examples/observability/simple_calculator_observability/configs/config-langsmith-optimize.yml
#
# After running, check your LangSmith project for:
#   - Trial runs with temperature parameters
#   - Feedback scores per trial for the accuracy metric
#   - A study summary run with the best configuration
#   - OTEL span traces for each LLM call (from the existing langsmith OTEL exporter)

general:
  telemetry:
    tracing:
      langsmith:
        _type: langsmith
        project: nat-optimize-demo

function_groups:
  calculator:
    _type: calculator

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024
    optimizable_params:
      - temperature
    search_space:
      temperature:
        low: 0.0
        high: 1.0
  eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

workflow:
  _type: react_agent
  tool_names: [calculator, current_datetime]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3

eval:
  general:
    max_concurrency: 1
    output_dir: .tmp/nat/examples/langsmith_optimize
    dataset:
      _type: json
      file_path: examples/getting_started/simple_calculator/src/nat_simple_calculator/data/simple_calculator.json
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: eval_llm
      default_scoring: true
      judge_llm_prompt: >
        You are an intelligent evaluator that scores the generated answer based on the description of the expected answer.
        The score is a measure of how well the generated answer matches the description of the expected answer based on the question.
        Rules:
        - The score must be a float of any value between 0.0 and 1.0 on a sliding scale.
        - The reasoning string must be concise and to the point.

optimizer:
  output_path: .tmp/nat/examples/langsmith_optimize/optimizer
  reps_per_param_set: 1
  eval_metrics:
    accuracy:
      evaluator_name: accuracy
      direction: maximize
  numeric:
    enabled: true
    n_trials: 3
  prompt:
    enabled: false
